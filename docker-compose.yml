version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: foxhole-stockpiles-db
    environment:
      POSTGRES_USER: foxhole_user
      POSTGRES_PASSWORD: foxhole_password
      POSTGRES_DB: foxhole_stockpiles
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/sql/db.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/sql/migrations:/docker-entrypoint-initdb.d/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxhole_user -d foxhole_stockpiles"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: node build/main.js
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
